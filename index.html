<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }

    .weather-app {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .app-title {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 22px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.16);
      color: white;
      font-size: 15px;
    }

    .search-box input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    .search-box button {
      border: none;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: white;
      padding: 14px 18px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
    }

    .weather-card {
      text-align: center;
      padding-top: 10px;
    }

    .weather-icon {
      width: 110px;
      height: 110px;
      margin: 0 auto 8px;
    }

    .city {
      font-size: 30px;
      font-weight: 800;
      margin-top: 4px;
    }

    .date {
      font-size: 14px;
      opacity: 0.85;
      margin-top: 6px;
      margin-bottom: 18px;
    }

    .temp {
      font-size: 60px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
    }

    .description {
      font-size: 18px;
      text-transform: capitalize;
      opacity: 0.95;
      margin-bottom: 24px;
    }

    .details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 10px;
    }

    .detail-box {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 16px 12px;
      text-align: left;
    }

    .detail-label {
      font-size: 13px;
      opacity: 0.75;
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 20px;
      font-weight: 800;
    }

    .message {
      text-align: center;
      font-size: 15px;
      margin-top: 10px;
      min-height: 22px;
    }

    .error {
      color: #fecaca;
    }

    .loading {
      text-align: center;
      font-size: 15px;
      padding: 20px 0;
    }

    @media (max-width: 480px) {
      .details {
        grid-template-columns: 1fr;
      }

      .search-box {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="weather-app">
    <h1 class="app-title">Weather App</h1>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city name..." />
      <button id="searchBtn">Search</button>
    </div>

    <div id="message" class="message">Search a city to get live weather.</div>
    <div id="weatherResult"></div>
  </div>

  <script>
    const API_KEY = "YOUR_NEW_API_KEY_HERE";

    const cityInput = document.getElementById("cityInput");
    const searchBtn = document.getElementById("searchBtn");
    const weatherResult = document.getElementById("weatherResult");
    const message = document.getElementById("message");

    function formatDate(timestamp) {
      const date = new Date(timestamp * 1000);
      return date.toLocaleString("en-US", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
      });
    }

    function setMessage(text, isError = false) {
      message.textContent = text;
      message.className = isError ? "message error" : "message";
    }

    async function parseApiError(response) {
      try {
        const data = await response.json();
        return data.message || `HTTP ${response.status}`;
      } catch {
        return `HTTP ${response.status}`;
      }
    }

    async function getCoordinates(city) {
      const geoUrl = `https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(city)}&limit=1&appid=${API_KEY}`;
      const response = await fetch(geoUrl);

      if (!response.ok) {
        const errMsg = await parseApiError(response);
        throw new Error(`Location API error: ${errMsg}`);
      }

      const data = await response.json();

      if (!data.length) {
        throw new Error("City not found. Please enter a valid city name.");
      }

      return {
        name: data[0].name,
        country: data[0].country,
        lat: data[0].lat,
        lon: data[0].lon,
      };
    }

    async function getWeather(lat, lon) {
      const weatherUrl = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`;
      const response = await fetch(weatherUrl);

      if (!response.ok) {
        const errMsg = await parseApiError(response);
        throw new Error(`Weather API error: ${errMsg}`);
      }

      return await response.json();
    }

    function renderWeather(location, data) {
      const iconCode = data.weather[0].icon;
      const iconUrl = `https://openweathermap.org/img/wn/${iconCode}@4x.png`;

      weatherResult.innerHTML = `
        <div class="weather-card">
          <img class="weather-icon" src="${iconUrl}" alt="${data.weather[0].description}" />
          <div class="city">${location.name}, ${location.country}</div>
          <div class="date">${formatDate(data.dt)}</div>
          <div class="temp">${Math.round(data.main.temp)}°C</div>
          <div class="description">${data.weather[0].description}</div>

          <div class="details">
            <div class="detail-box">
              <div class="detail-label">Feels Like</div>
              <div class="detail-value">${Math.round(data.main.feels_like)}°C</div>
            </div>
            <div class="detail-box">
              <div class="detail-label">Humidity</div>
              <div class="detail-value">${data.main.humidity}%</div>
            </div>
            <div class="detail-box">
              <div class="detail-label">Wind Speed</div>
              <div class="detail-value">${data.wind.speed} m/s</div>
            </div>
            <div class="detail-box">
              <div class="detail-label">Pressure</div>
              <div class="detail-value">${data.main.pressure} hPa</div>
            </div>
          </div>
        </div>
      `;
    }

    async function fetchWeather() {
      const city = cityInput.value.trim();

      if (!API_KEY || API_KEY === "YOUR_NEW_API_KEY_HERE") {
        setMessage("Please add your OpenWeather API key first.", true);
        weatherResult.innerHTML = "";
        return;
      }

      if (!city) {
        setMessage("Please enter a city name.", true);
        weatherResult.innerHTML = "";
        return;
      }

      setMessage("");
      weatherResult.innerHTML = `<div class="loading">Loading weather...</div>`;

      try {
        const location = await getCoordinates(city);
        const weatherData = await getWeather(location.lat, location.lon);
        renderWeather(location, weatherData);
        setMessage("");
      } catch (error) {
        weatherResult.innerHTML = "";
        setMessage(error.message || "Something went wrong.", true);
        console.error(error);
      }
    }

    searchBtn.addEventListener("click", fetchWeather);
    cityInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") fetchWeather();
    });

    cityInput.value = "London";
    fetchWeather();
  </script>
</body>
</html>
