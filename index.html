<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }

    .weather-app {
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .app-title {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 22px;
      letter-spacing: 0.5px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.16);
      color: white;
      font-size: 15px;
    }

    .search-box input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    .search-box button {
      border: none;
      outline: none;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: white;
      padding: 14px 18px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
    }

    .message {
      text-align: center;
      min-height: 24px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .weather-card {
      text-align: center;
      padding-top: 12px;
    }

    .weather-emoji {
      font-size: 70px;
      margin-bottom: 8px;
    }

    .city {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .date {
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 16px;
    }

    .temp {
      font-size: 60px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 10px;
    }

    .description {
      font-size: 18px;
      margin-bottom: 22px;
      text-transform: capitalize;
    }

    .details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 8px;
    }

    .detail-box {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 16px 12px;
      text-align: left;
    }

    .detail-label {
      font-size: 13px;
      opacity: 0.75;
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 20px;
      font-weight: 800;
    }

    .loading {
      text-align: center;
      padding: 20px 0;
      font-size: 15px;
    }

    @media (max-width: 480px) {
      .search-box {
        flex-direction: column;
      }

      .details {
        grid-template-columns: 1fr;
      }

      .temp {
        font-size: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="weather-app">
    <h1 class="app-title">Weather App</h1>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city name..." />
      <button id="searchBtn">Search</button>
    </div>

    <div id="message" class="message">Search a city to get live weather.</div>
    <div id="weatherResult"></div>
  </div>

  <script>
    const cityInput = document.getElementById("cityInput");
    const searchBtn = document.getElementById("searchBtn");
    const weatherResult = document.getElementById("weatherResult");
    const message = document.getElementById("message");

    function setMessage(text) {
      message.textContent = text;
    }

    function formatDate() {
      return new Date().toLocaleString("en-US", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function getWeatherInfo(code) {
      const weatherMap = {
        0: { text: "Clear sky", icon: "☀️" },
        1: { text: "Mainly clear", icon: "🌤️" },
        2: { text: "Partly cloudy", icon: "⛅" },
        3: { text: "Overcast", icon: "☁️" },
        45: { text: "Fog", icon: "🌫️" },
        48: { text: "Depositing rime fog", icon: "🌫️" },
        51: { text: "Light drizzle", icon: "🌦️" },
        53: { text: "Moderate drizzle", icon: "🌦️" },
        55: { text: "Dense drizzle", icon: "🌧️" },
        56: { text: "Light freezing drizzle", icon: "🌧️" },
        57: { text: "Dense freezing drizzle", icon: "🌧️" },
        61: { text: "Slight rain", icon: "🌦️" },
        63: { text: "Moderate rain", icon: "🌧️" },
        65: { text: "Heavy rain", icon: "🌧️" },
        66: { text: "Light freezing rain", icon: "🌧️" },
        67: { text: "Heavy freezing rain", icon: "🌧️" },
        71: { text: "Slight snow fall", icon: "❄️" },
        73: { text: "Moderate snow fall", icon: "❄️" },
        75: { text: "Heavy snow fall", icon: "❄️" },
        77: { text: "Snow grains", icon: "❄️" },
        80: { text: "Slight rain showers", icon: "🌦️" },
        81: { text: "Moderate rain showers", icon: "🌧️" },
        82: { text: "Violent rain showers", icon: "⛈️" },
        85: { text: "Slight snow showers", icon: "🌨️" },
        86: { text: "Heavy snow showers", icon: "🌨️" },
        95: { text: "Thunderstorm", icon: "⛈️" },
        96: { text: "Thunderstorm with hail", icon: "⛈️" },
        99: { text: "Heavy thunderstorm with hail", icon: "⛈️" }
      };

      return weatherMap[code] || { text: "Unknown weather", icon: "🌍" };
    }

    async function getCoordinates(city) {
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
      const response = await fetch(url);
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.reason || "Failed to fetch location.");
      }

      if (!data.results || !data.results.length) {
        throw new Error("City not found.");
      }

      const place = data.results[0];
      return {
        name: place.name,
        country: place.country,
        latitude: place.latitude,
        longitude: place.longitude
      };
    }

    async function getWeather(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,surface_pressure&timezone=auto`;
      const response = await fetch(url);
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.reason || "Failed to fetch weather.");
      }

      return data;
    }

    function renderWeather(location, data) {
      const current = data.current;
      const weather = getWeatherInfo(current.weather_code);

      weatherResult.innerHTML = `
        <div class="weather-card">
          <div class="weather-emoji">${weather.icon}</div>
          <div class="city">${location.name}, ${location.country}</div>
          <div class="date">${formatDate()}</div>
          <div class="temp">${Math.round(current.temperature_2m)}°C</div>
          <div class="description">${weather.text}</div>

          <div class="details">
            <div class="detail-box">
              <div class="detail-label">Feels Like</div>
              <div class="detail-value">${Math.round(current.apparent_temperature)}°C</div>
            </div>
            <div class="detail-box">
              <div class="detail-label">Humidity</div>
              <div class="detail-value">${current.relative_humidity_2m}%</div>
            </div>
            <div class="detail-box">
              <div class="detail-label">Wind Speed</div>
              <div class="detail-value">${Math.round(current.wind_speed_10m)} km/h</div>
            </div>
            <div class="detail-box">
              <div class="detail-label">Pressure</div>
              <div class="detail-value">${Math.round(current.surface_pressure)} hPa</div>
            </div>
          </div>
        </div>
      `;
    }

    async function fetchWeather() {
      const city = cityInput.value.trim();

      if (!city) {
        setMessage("Please enter a city name.");
        weatherResult.innerHTML = "";
        return;
      }

      setMessage("");
      weatherResult.innerHTML = `<div class="loading">Loading weather...</div>`;

      try {
        const location = await getCoordinates(city);
        const weatherData = await getWeather(location.latitude, location.longitude);
        renderWeather(location, weatherData);
        setMessage("");
      } catch (error) {
        weatherResult.innerHTML = "";
        setMessage(error.message || "Something went wrong.");
        console.error(error);
      }
    }

    searchBtn.addEventListener("click", fetchWeather);
    cityInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") fetchWeather();
    });

    cityInput.value = "London";
    fetchWeather();
  </script>
</body>
</html>
